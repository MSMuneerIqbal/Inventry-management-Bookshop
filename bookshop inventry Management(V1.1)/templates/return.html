<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Returns</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="fas fa-arrow-left me-2"></i>Bookshop</a>
        </div>
    </nav>
    <div class="container mt-4">
        <h1><i class="fas fa-undo me-2"></i>Process Return</h1>
        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="alert alert-{{ 'success' if 'success' in messages[0] else 'danger' }}">{{ messages[0] }}</div>
        {% endif %}
        {% endwith %}
        <div class="card">
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label"><i class="fas fa-book me-1"></i>Product Name</label>
                        <input type="text" name="name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label"><i class="fas fa-sort-numeric-down me-1"></i>Quantity to
                            Return</label>
                        <input type="number" name="qty" min="1" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-check me-2"></i>Return</button>
                </form>
            </div>
        </div>
        <a href="/" class="btn btn-secondary mt-3"><i class="fas fa-home me-2"></i>Back to Home</a>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
