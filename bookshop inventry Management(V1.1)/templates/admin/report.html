<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Sales Report</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/admin"><i class="fas fa-arrow-left me-2"></i>Back</a>
        </div>
    </nav>
    <div class="container mt-4">
        <h1><i class="fas fa-chart-bar me-2"></i>Sales History Report</h1>
        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="alert alert-info">{{ messages[0] }}</div>
        {% endif %}
        {% endwith %}
        <form method="POST" class="mb-4">
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label"><i class="fas fa-calendar me-1"></i>Start Date</label>
                    <input type="date" name="start_date" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label"><i class="fas fa-calendar me-1"></i>End Date</label>
                    <input type="date" name="end_date" class="form-control" required>
                </div>
                <div class="col-md-4 align-self-end">
                    <button type="submit" class="btn btn-primary"><i class="fas fa-download me-2"></i>Generate
                        Excel</button>
                </div>
            </div>
        </form>
    </div>
</body>

</html>
