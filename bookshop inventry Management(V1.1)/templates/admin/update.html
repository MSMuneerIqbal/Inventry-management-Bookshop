<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Update Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/admin"><i class="fas fa-arrow-left me-2"></i>Back</a>
        </div>
    </nav>
    <div class="container mt-4">
        <h1><i class="fas fa-edit me-2"></i>Update Product</h1>
        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="alert alert-danger">{{ messages[0] }}</div>
        {% endif %}
        {% endwith %}
        <div class="card">
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label"><i class="fas fa-book me-1"></i>Name</label>
                        <input type="text" name="name" value="{{ product.name }}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label"><i class="fas fa-user me-1"></i>Author</label>
                        <input type="text" name="author" value="{{ product.author or '' }}" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label"><i class="fas fa-tags me-1"></i>Category</label>
                        <select name="category_id" class="form-select" required>
                            {% for cat in categories %}
                            <option value="{{ cat.id }}" {% if cat.id==product.category_id %}selected{% endif %}>{{
                                cat.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label"><i class="fas fa-sort-numeric-down me-1"></i>Quantity</label>
                        <input type="number" name="quantity" value="{{ product.quantity }}" class="form-control" min="0"
                            required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label"><i class="fas fa-dollar-sign me-1"></i>Price</label>
                        <input type="number" step="0.01" name="price" value="{{ product.price }}" class="form-control"
                            required>
                    </div>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save me-2"></i>Update</button>
                    <a href="/admin" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
