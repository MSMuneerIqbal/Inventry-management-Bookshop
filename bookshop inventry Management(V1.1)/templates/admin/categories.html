<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Categories</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/admin"><i class="fas fa-arrow-left me-2"></i>Back</a>
        </div>
    </nav>
    <div class="container mt-4">
        <h1><i class="fas fa-tags me-2"></i>Categories</h1>
        <a href="/admin/add_category" class="btn btn-success mb-3"><i class="fas fa-plus me-2"></i>Add Category</a>
        <div class="table-responsive">
            <table class="table table-striped">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for cat in categories %}
                    <tr>
                        <td>{{ cat.id }}</td>
                        <td>{{ cat.name }}</td>
                        <td>
                            <a href="/admin/update_category/{{ cat.id }}" class="btn btn-sm btn-outline-warning"><i
                                    class="fas fa-edit"></i></a>
                            <form method="POST" action="/admin/delete_category/{{ cat.id }}" class="d-inline"
                                onsubmit="return confirm('Delete?')">
                                <button type="submit" class="btn btn-sm btn-outline-danger"><i
                                        class="fas fa-trash"></i></button>
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>
