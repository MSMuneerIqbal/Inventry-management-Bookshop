{% extends "admin/base.html" %}
{% block title %}Add Category{% endblock %}
{% block page_icon %}fas fa-folder-plus{% endblock %}
{% block page_title %}Add Category{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="admin-card">
            <div class="card-head"><i class="fas fa-tag"></i> New Category</div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Category Name</label>
                        <input type="text" name="name" class="form-control" placeholder="e.g. Bangles, Jewellery" required autofocus>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary px-4">
                            <i class="fas fa-save me-2"></i>Save
                        </button>
                        <a href="/admin/categories" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
