<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; }
        .login-card { max-width: 420px; margin: auto; border: none; border-radius: 16px; }
        .login-card .card-body { padding: 2.5rem; }
        .logo-img { height: 100px; object-fit: contain; border-radius: 12px; }
    </style>
</head>
<body class="d-flex align-items-center min-vh-100">
    <div class="container">
        <div class="card login-card shadow-lg">
            <div class="card-body text-center">
                <img src="{{ url_for('static', filename='images/logo.jpeg') }}" alt="Logo" class="logo-img mb-3">
                <h4 class="fw-bold text-dark">{{ shop_settings.shop_name if shop_settings else 'Bookshop' }}</h4>
                <p class="text-muted mb-4">Admin Panel</p>
                {% with messages = get_flashed_messages() %}
                {% if messages %}
                <div class="alert alert-danger py-2">{{ messages[0] }}</div>
                {% endif %}
                {% endwith %}
                <form method="POST">
                    <div class="mb-3 text-start">
                        <label class="form-label fw-semibold"><i class="fas fa-lock me-1"></i>Password</label>
                        <input type="password" name="password" class="form-control form-control-lg" placeholder="Enter admin password" required autofocus>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100">
                        <i class="fas fa-sign-in-alt me-2"></i>Login
                    </button>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
