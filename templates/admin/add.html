{% extends "admin/base.html" %}
{% block title %}Add Product{% endblock %}
{% block page_icon %}fas fa-plus-circle{% endblock %}
{% block page_title %}Add New Product{% endblock %}
{% block content %}
<div class="d-flex justify-content-end mb-3">
    <a href="/admin/products" class="btn btn-sm btn-outline-secondary">
        <i class="fas fa-arrow-left me-1"></i>Back to Products
    </a>
</div>
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="admin-card">
            <div class="card-head"><i class="fas fa-box"></i> Product Details</div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Product Name <span class="text-danger">*</span></label>
                        <input type="text" name="name" class="form-control" placeholder="e.g. Gold Bangle Set" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Description</label>
                        <textarea name="description" class="form-control" rows="2"
                                  placeholder="Brief description, size, weight, material..."></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Category <span class="text-danger">*</span></label>
                        <select name="category_id" class="form-select" required>
                            {% for cat in categories %}
                            <option value="{{ cat.id }}">{{ cat.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Quantity <span class="text-danger">*</span></label>
                            <input type="number" name="quantity" class="form-control" min="0" value="0" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Sale Price (Rs.) <span class="text-danger">*</span></label>
                            <input type="number" step="0.01" name="price" class="form-control" placeholder="0.00" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Purchase Price (Rs.)</label>
                            <input type="number" step="0.01" name="purchase_price" class="form-control" placeholder="Admin only">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">
                            <i class="fas fa-exclamation-triangle me-1" style="color:#D97706;"></i>
                            Low Stock Alert Limit
                        </label>
                        <input type="number" name="low_stock_limit" class="form-control" min="0" value="5"
                               style="max-width:160px;">
                        <div class="form-text">Alert when stock falls below this number.</div>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary px-4">
                            <i class="fas fa-save me-2"></i>Save Product
                        </button>
                        <a href="/admin/products" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
